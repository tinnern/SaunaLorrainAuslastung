<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sauna Lorrainebad - Auslastung</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        .current-status {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .sauna-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .sauna-name {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .opening-status {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .opening-status.open {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .opening-status.closed {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .occupancy-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .occupancy-circle {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .occupancy-circle svg {
            transform: rotate(-90deg);
        }

        .occupancy-circle .bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 10;
        }

        .occupancy-circle .progress {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .occupancy-circle .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
        }

        .occupancy-info {
            text-align: center;
        }

        .seats {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .message {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #f39c12;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        .weekday-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .weekday-tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .weekday-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        .weekday-tab.active {
            background: #f39c12;
            border-color: #f39c12;
            color: #000;
            font-weight: bold;
        }

        .weekday-tab.women-only {
            border-color: #e91e8b;
        }

        .weekday-tab.women-only.active {
            background: #e91e8b;
        }

        .weekday-tab.closed {
            border-color: #666;
            color: #555;
            text-decoration: line-through;
        }

        .weekday-tab.closed.active {
            background: #444;
            color: #888;
        }

        .day-notice {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .day-notice.women-only {
            background: rgba(233, 30, 139, 0.15);
            border: 1px solid rgba(233, 30, 139, 0.3);
            color: #e91e8b;
        }

        .day-notice.closed {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .stat-hour {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stat-value.low { color: #2ecc71; }
        .stat-value.medium { color: #f39c12; }
        .stat-value.high { color: #e74c3c; }

        .last-update {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        /* Weather styles */
        .weather-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.95rem;
        }

        .weather-temp {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .weather-desc {
            color: #aaa;
            font-size: 0.85rem;
        }

        .weather-icon {
            font-size: 1.3rem;
        }

        /* Weather correlation section */
        .correlation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .correlation-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
        }

        .correlation-card h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .correlation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .correlation-item:last-child {
            border-bottom: none;
        }

        .correlation-label {
            color: #ccc;
            font-size: 0.9rem;
        }

        .correlation-value {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .correlation-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }

        .correlation-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .correlation-insight {
            margin-top: 15px;
            padding: 12px;
            background: rgba(243, 156, 18, 0.1);
            border-radius: 8px;
            border-left: 3px solid #f39c12;
            font-size: 0.85rem;
            color: #ddd;
        }

        .data-count {
            font-size: 0.75rem;
            color: #666;
            margin-top: 10px;
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 16px;
            height: 12px;
            border-radius: 2px;
            display: inline-block;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .sauna-card { padding: 25px; }
            .occupancy-circle { width: 120px; height: 120px; }
            .seats { font-size: 1.3rem; }
            .correlation-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sauna Lorrainebad</h1>
            <p class="subtitle">Aktuelle Auslastung & Statistiken</p>
            <div id="weather-badge" class="weather-badge" style="display: none;">
                <span class="weather-icon" id="weather-icon"></span>
                <span class="weather-temp" id="weather-temp"></span>
                <span class="weather-desc" id="weather-desc"></span>
            </div>
        </header>

        <div id="current-status" class="current-status">
            <div class="loading">Lade aktuelle Daten...</div>
        </div>

        <div class="section">
            <h2>Typische Auslastung nach Uhrzeit</h2>
            <div id="weekday-tabs" class="weekday-tabs"></div>
            <div id="day-notice"></div>
            <div class="chart-container">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>Verlauf der letzten 24 Stunden</h2>
            <div class="chart-container">
                <canvas id="historyChart"></canvas>
            </div>
            <div class="chart-legend">
                <span class="legend-item"><span class="legend-color" style="background: rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.4);"></span> Geschlossen</span>
            </div>
        </div>

        <div class="section">
            <h2>Beste Zeiten <span id="best-times-day"></span></h2>
            <div id="best-times" class="stats-grid">
                <div class="loading">Berechne...</div>
            </div>
        </div>

        <div class="section" id="weather-section" style="display: none;">
            <h2>Wetter & Auslastung</h2>
            <div id="weather-correlation" class="correlation-grid">
                <div class="loading">Sammle Wetterdaten...</div>
            </div>
        </div>

        <p class="last-update" id="last-update"></p>
    </div>

    <script>
        // Only show "Sauna" (not "Sauna rechts")
        const DISPLAY_SAUNA = 'Sauna';
        const CHART_COLOR = '#f39c12';

        // Weekday configuration
        const WEEKDAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const WEEKDAY_LABELS = {
            'Monday': 'Mo (FLINTA*)',
            'Tuesday': 'Di',
            'Wednesday': 'Mi (Zu)',
            'Thursday': 'Do',
            'Friday': 'Fr',
            'Saturday': 'Sa',
            'Sunday': 'So'
        };
        const SPECIAL_DAYS = {
            'Monday': { type: 'women-only', notice: 'Montag ist FLINTA*-Tag.' },
            'Wednesday': { type: 'closed', notice: 'Mittwoch ist die Sauna geschlossen.' }
        };
        // Opening hours per weekday: [openHour, closeHour]
        const OPENING_HOURS = {
            'Monday': [10, 21],
            'Tuesday': [10, 21],
            'Wednesday': null, // closed
            'Thursday': [10, 21],
            'Friday': [10, 21],
            'Saturday': [9, 21],
            'Sunday': [9, 21]
        };

        let globalStats = null;
        let hourlyChart = null;
        let selectedWeekday = null;

        function getColor(percent) {
            if (percent < 50) return '#2ecc71';
            if (percent < 80) return '#f39c12';
            return '#e74c3c';
        }

        function getColorClass(percent) {
            if (percent < 50) return 'low';
            if (percent < 80) return 'medium';
            return 'high';
        }

        function createOccupancyCircle(percent) {
            const color = getColor(percent);
            const circumference = 2 * Math.PI * 60;
            const offset = circumference - (Math.min(percent, 100) / 100) * circumference;

            return `
                <svg width="140" height="140" viewBox="0 0 140 140">
                    <circle class="bg" cx="70" cy="70" r="60"></circle>
                    <circle class="progress" cx="70" cy="70" r="60"
                        style="stroke: ${color}; stroke-dasharray: ${circumference}; stroke-dashoffset: ${offset};">
                    </circle>
                </svg>
                <span class="percentage" style="color: ${color}">${Math.round(percent)}%</span>
            `;
        }

        function isCurrentlyOpen() {
            const now = new Date();
            const currentDay = getCurrentWeekday();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const openingHours = OPENING_HOURS[currentDay];

            if (!openingHours) return false;

            const [openHour, closeHour] = openingHours;
            // Close time is 21:30, so open until 21:30
            if (currentHour < openHour) return false;
            if (currentHour > closeHour) return false;
            if (currentHour === closeHour && currentMinute > 30) return false;

            return true;
        }

        function getOpeningStatus() {
            const now = new Date();
            const currentDay = getCurrentWeekday();
            const openingHours = OPENING_HOURS[currentDay];

            if (!openingHours) {
                return { open: false, text: 'Heute geschlossen' };
            }

            const [openHour, closeHour] = openingHours;
            const isOpen = isCurrentlyOpen();

            if (isOpen) {
                return { open: true, text: `Offen bis ${closeHour}:30` };
            } else {
                const currentHour = now.getHours();
                if (currentHour < openHour) {
                    return { open: false, text: `Öffnet um ${openHour}:00` };
                } else {
                    return { open: false, text: 'Geschlossen' };
                }
            }
        }

        function renderCurrentStatus(data) {
            const container = document.getElementById('current-status');

            if (!data || !data.saunas || data.saunas.length === 0) {
                container.innerHTML = '<div class="loading">Keine aktuellen Daten verfügbar</div>';
                return;
            }

            // Only show "Sauna", not "Sauna rechts"
            const sauna = data.saunas.find(s => s.name === DISPLAY_SAUNA);
            if (!sauna) {
                container.innerHTML = '<div class="loading">Keine aktuellen Daten verfügbar</div>';
                return;
            }

            const status = getOpeningStatus();
            const statusClass = status.open ? 'open' : 'closed';
            const isClosed = !status.open || sauna.current_seats < 0;

            let occupancyContent;
            if (isClosed) {
                occupancyContent = `
                    <div class="occupancy-circle">
                        ${createOccupancyCircle(0)}
                    </div>
                    <div class="occupancy-info">
                        <div class="seats">Geschlossen</div>
                        <div class="message">${status.text}</div>
                    </div>
                `;
            } else {
                occupancyContent = `
                    <div class="occupancy-circle">
                        ${createOccupancyCircle(sauna.occupancy_percent)}
                    </div>
                    <div class="occupancy-info">
                        <div class="seats">${sauna.current_seats} / ${sauna.max_seats} Plätze</div>
                        <div class="message">${sauna.capacity_message}</div>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="sauna-card">
                    <div class="sauna-name">Aktuelle Auslastung</div>
                    <div class="opening-status ${statusClass}">${status.text}</div>
                    <div class="occupancy-display">
                        ${occupancyContent}
                    </div>
                </div>
            `;

            document.getElementById('last-update').textContent =
                `Letzte Aktualisierung: ${new Date(data.timestamp).toLocaleString('de-CH')}`;

            // Render weather badge if available
            if (data.weather) {
                renderWeatherBadge(data.weather);
            }
        }

        function getCurrentWeekday() {
            return WEEKDAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
        }

        function renderWeekdayTabs(stats) {
            const container = document.getElementById('weekday-tabs');
            const currentDay = getCurrentWeekday();
            selectedWeekday = currentDay;

            container.innerHTML = WEEKDAYS.map(day => {
                const special = SPECIAL_DAYS[day];
                const specialClass = special ? special.type : '';
                const isActive = day === currentDay ? 'active' : '';
                return `<button class="weekday-tab ${specialClass} ${isActive}" data-day="${day}">${WEEKDAY_LABELS[day]}</button>`;
            }).join('');

            // Add click handlers
            container.querySelectorAll('.weekday-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    container.querySelectorAll('.weekday-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    selectedWeekday = tab.dataset.day;
                    updateHourlyChart();
                    updateDayNotice();
                    renderBestTimes(globalStats);
                });
            });

            updateDayNotice();
        }

        function updateDayNotice() {
            const container = document.getElementById('day-notice');
            const special = SPECIAL_DAYS[selectedWeekday];

            if (special) {
                container.innerHTML = `<div class="day-notice ${special.type}">${special.notice}</div>`;
            } else {
                container.innerHTML = '';
            }
        }

        function hasWeekdayData(weekday) {
            const weekdayData = globalStats?.by_weekday?.[weekday] || {};
            for (let h = 0; h < 24; h++) {
                if (weekdayData[h] && weekdayData[h][DISPLAY_SAUNA]) {
                    return true;
                }
            }
            return false;
        }

        function updateHourlyChart() {
            if (!globalStats || !hourlyChart) return;

            const chartContainer = document.getElementById('hourlyChart').parentElement;
            const noDataMsg = document.getElementById('hourly-no-data');

            // Check if we have data for this weekday
            const hasData = hasWeekdayData(selectedWeekday);

            if (!hasData && selectedWeekday !== 'Wednesday') {
                // Show no data message
                if (!noDataMsg) {
                    const msg = document.createElement('div');
                    msg.id = 'hourly-no-data';
                    msg.className = 'loading';
                    msg.style.position = 'absolute';
                    msg.style.top = '50%';
                    msg.style.left = '50%';
                    msg.style.transform = 'translate(-50%, -50%)';
                    msg.textContent = 'Noch keine Daten für diesen Wochentag';
                    chartContainer.style.position = 'relative';
                    chartContainer.appendChild(msg);
                }
                hourlyChart.data.datasets[0].data = [];
                hourlyChart.update();
                return;
            } else if (noDataMsg) {
                noDataMsg.remove();
            }

            const hours = [];
            const data = [];

            // Use weekday-specific data only (no fallback)
            const weekdayData = globalStats.by_weekday?.[selectedWeekday] || {};
            const openingHours = OPENING_HOURS[selectedWeekday];

            // If closed (Wednesday), show empty chart
            if (!openingHours) {
                hourlyChart.data.labels = [];
                hourlyChart.data.datasets[0].data = [];
                hourlyChart.update();
                return;
            }

            const [openHour, closeHour] = openingHours;

            for (let h = openHour; h <= closeHour; h++) {
                hours.push(`${h}:00`);
                const hourData = weekdayData[h] || {};
                const saunaData = hourData[DISPLAY_SAUNA];
                data.push(saunaData ? saunaData.avg : null);
            }

            hourlyChart.data.labels = hours;
            hourlyChart.data.datasets[0].data = data;
            hourlyChart.update();
        }

        function renderHourlyChart(stats) {
            globalStats = stats;
            const ctx = document.getElementById('hourlyChart').getContext('2d');

            renderWeekdayTabs(stats);

            const hours = [];
            const data = [];

            // Use weekday-specific data for current day (no fallback)
            const currentDay = getCurrentWeekday();
            const weekdayData = stats.by_weekday?.[currentDay] || {};
            const openingHours = OPENING_HOURS[currentDay];

            if (openingHours) {
                const [openHour, closeHour] = openingHours;
                for (let h = openHour; h <= closeHour; h++) {
                    hours.push(`${h}:00`);
                    const hourData = weekdayData[h] || {};
                    const saunaData = hourData[DISPLAY_SAUNA];
                    data.push(saunaData ? saunaData.avg : null);
                }
            }

            hourlyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [{
                        label: 'Auslastung',
                        data: data,
                        borderColor: CHART_COLOR,
                        backgroundColor: CHART_COLOR + '30',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 160,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888', callback: v => v + '%' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }

        function isTimeOpen(date) {
            const dayName = WEEKDAYS[date.getDay() === 0 ? 6 : date.getDay() - 1];
            const hours = OPENING_HOURS[dayName];
            if (!hours) return false;

            const [openHour, closeHour] = hours;
            const hour = date.getHours();
            const minute = date.getMinutes();

            if (hour < openHour) return false;
            if (hour > closeHour) return false;
            if (hour === closeHour && minute > 30) return false;
            return true;
        }

        function renderHistoryChart(records) {
            const container = document.getElementById('historyChart').parentElement;

            // Get last 24 hours of data, only for "Sauna", sorted by time
            const now = new Date();
            const oneDayAgo = new Date(now - 24 * 60 * 60 * 1000);

            const filteredData = records
                .filter(r => r.name === DISPLAY_SAUNA && new Date(r.timestamp) >= oneDayAgo)
                .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            // Need at least 2 data points
            if (filteredData.length < 2) {
                container.innerHTML = '<div class="loading">Sammle Daten... (mind. 2 Messpunkte nötig)</div>';
                return;
            }

            // Build data arrays
            const labels = [];
            const values = [];
            const closedAnnotations = [];

            // First pass: build labels and values arrays
            filteredData.forEach((r, idx) => {
                const d = new Date(r.timestamp);
                const label = d.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
                const occupancy = r.occupancy_percent;
                const isOpen = isTimeOpen(d);

                labels.push(label);

                // If this point is during closed hours or negative, show null
                if (!isOpen || occupancy < 0) {
                    values.push(null);
                } else {
                    values.push(occupancy);
                }
            });

            // Check if we have any valid (non-null) data points
            const hasValidData = values.some(v => v !== null);

            // Second pass: find closed periods (consecutive nulls) and create annotations
            function addClosedAnnotation(startIdx, endIdx) {
                // Only add if at least 2 points in the closed period
                if (endIdx - startIdx >= 1) {
                    closedAnnotations.push({
                        type: 'box',
                        xMin: startIdx - 0.5,
                        xMax: endIdx + 0.5,
                        backgroundColor: 'rgba(231, 76, 60, 0.15)',
                        borderColor: 'rgba(231, 76, 60, 0.4)',
                        borderWidth: 1,
                        label: {
                            display: true,
                            content: 'Geschlossen',
                            color: '#e74c3c',
                            font: { size: 11, weight: 'bold' },
                            position: 'center'
                        }
                    });
                }
            }

            let closedStart = null;
            for (let i = 0; i < values.length; i++) {
                if (values[i] === null) {
                    if (closedStart === null) {
                        closedStart = i;
                    }
                } else {
                    if (closedStart !== null) {
                        addClosedAnnotation(closedStart, i - 1);
                        closedStart = null;
                    }
                }
            }
            // Handle trailing closed period (data ends while still closed)
            if (closedStart !== null) {
                addClosedAnnotation(closedStart, values.length - 1);
            }

            // If all data is during closed hours, show a message instead
            if (!hasValidData) {
                container.innerHTML = '<div class="loading">Sauna ist aktuell geschlossen - Daten werden angezeigt sobald geöffnet</div>';
                return;
            }

            try {
                const ctx = document.getElementById('historyChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Auslastung',
                            data: values,
                            borderColor: CHART_COLOR,
                            borderWidth: 2,
                            fill: false,
                            tension: 0.3,
                            pointRadius: 4,
                            pointBackgroundColor: CHART_COLOR,
                            spanGaps: false // Don't connect across closed periods
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            annotation: {
                                annotations: closedAnnotations
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 160,
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#888', callback: v => v + '%' }
                            },
                            x: {
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#888', maxRotation: 45 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error rendering history chart:', error);
                container.innerHTML = '<div class="loading">Fehler beim Laden des Diagramms</div>';
            }
        }

        function getWeatherIcon(code, isSunny, isRainy) {
            if (isRainy) return '🌧️';
            if (isSunny) return '☀️';
            if (code === 0 || code === 1) return '☀️';
            if (code === 2) return '⛅';
            if (code === 3) return '☁️';
            if (code >= 45 && code <= 48) return '🌫️';
            if (code >= 51 && code <= 67) return '🌧️';
            if (code >= 71 && code <= 77) return '🌨️';
            if (code >= 80 && code <= 82) return '🌦️';
            if (code >= 85 && code <= 86) return '🌨️';
            if (code >= 95) return '⛈️';
            return '🌡️';
        }

        function renderWeatherBadge(weather) {
            if (!weather) return;

            const badge = document.getElementById('weather-badge');
            const icon = document.getElementById('weather-icon');
            const temp = document.getElementById('weather-temp');
            const desc = document.getElementById('weather-desc');

            icon.textContent = getWeatherIcon(weather.weather_code, weather.is_sunny, weather.is_rainy);
            temp.textContent = `${Math.round(weather.temperature)}°C`;
            // Show only the German part of the description
            const germanDesc = weather.weather_description.split(' | ')[0];
            desc.textContent = germanDesc;
            badge.style.display = 'inline-flex';
        }

        function renderWeatherCorrelation(stats) {
            const section = document.getElementById('weather-section');
            const container = document.getElementById('weather-correlation');

            if (!stats || stats.total_records < 5) {
                container.innerHTML = '<div class="loading">Noch nicht genug Wetterdaten gesammelt (mindestens 5 Messpunkte nötig)</div>';
                return;
            }

            section.style.display = 'block';
            const overallAvg = stats.overall_avg;

            let html = '';

            // Temperature correlation
            if (Object.keys(stats.by_temperature).length > 0) {
                html += `
                    <div class="correlation-card">
                        <h3>Nach Temperatur</h3>
                        ${Object.entries(stats.by_temperature).map(([bucket, data]) => {
                            const diff = data.avg - overallAvg;
                            const diffText = diff > 0 ? `+${diff.toFixed(0)}%` : `${diff.toFixed(0)}%`;
                            const diffColor = diff > 5 ? '#e74c3c' : diff < -5 ? '#2ecc71' : '#888';
                            return `
                                <div class="correlation-item">
                                    <span class="correlation-label">${bucket}</span>
                                    <span class="correlation-value" style="color: ${getColor(data.avg)}">${data.avg.toFixed(0)}%</span>
                                </div>
                                <div class="correlation-bar">
                                    <div class="correlation-bar-fill" style="width: ${Math.min(data.avg, 100)}%; background: ${getColor(data.avg)}"></div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            // Weather conditions
            if (Object.keys(stats.by_condition).length > 0) {
                const conditionLabels = {
                    'rainy': '🌧️ Regen',
                    'sunny': '☀️ Sonnig',
                    'cloudy': '☁️ Bewölkt'
                };
                html += `
                    <div class="correlation-card">
                        <h3>Nach Wetterlage</h3>
                        ${Object.entries(stats.by_condition).map(([condition, data]) => {
                            const diff = data.avg - overallAvg;
                            return `
                                <div class="correlation-item">
                                    <span class="correlation-label">${conditionLabels[condition] || condition}</span>
                                    <span class="correlation-value" style="color: ${getColor(data.avg)}">${data.avg.toFixed(0)}%</span>
                                </div>
                                <div class="correlation-bar">
                                    <div class="correlation-bar-fill" style="width: ${Math.min(data.avg, 100)}%; background: ${getColor(data.avg)}"></div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            // Generate insight
            let insight = '';
            const tempData = stats.by_temperature;
            const condData = stats.by_condition;

            // Find temperature with highest occupancy
            let maxTempBucket = null;
            let maxTempAvg = 0;
            for (const [bucket, data] of Object.entries(tempData)) {
                if (data.avg > maxTempAvg) {
                    maxTempAvg = data.avg;
                    maxTempBucket = bucket;
                }
            }

            // Check rain effect
            if (condData.rainy && condData.sunny) {
                const rainDiff = condData.rainy.avg - condData.sunny.avg;
                if (rainDiff > 10) {
                    insight = `Bei Regenwetter ist die Sauna durchschnittlich ${rainDiff.toFixed(0)}% voller als bei Sonnenschein.`;
                } else if (rainDiff < -10) {
                    insight = `Bei Sonnenschein ist die Sauna durchschnittlich ${Math.abs(rainDiff).toFixed(0)}% voller als bei Regen.`;
                }
            }

            if (!insight && maxTempBucket) {
                insight = `Die höchste Auslastung gibt es bei Temperaturen von ${maxTempBucket}.`;
            }

            if (insight) {
                html += `<div class="correlation-insight">${insight}</div>`;
            }

            html += `<div class="data-count">Basierend auf ${stats.total_records} Messungen</div>`;

            container.innerHTML = html;
        }

        function renderBestTimes(stats) {
            const container = document.getElementById('best-times');
            const dayLabel = document.getElementById('best-times-day');

            const dayNames = {
                'Monday': '(Montag)',
                'Tuesday': '(Dienstag)',
                'Wednesday': '(Mittwoch)',
                'Thursday': '(Donnerstag)',
                'Friday': '(Freitag)',
                'Saturday': '(Samstag)',
                'Sunday': '(Sonntag)'
            };
            dayLabel.textContent = dayNames[selectedWeekday] || '';

            // Use weekday-specific data only (no fallback)
            const weekdayData = stats.by_weekday?.[selectedWeekday] || {};
            const openingHours = OPENING_HOURS[selectedWeekday];

            if (!openingHours) {
                container.innerHTML = '<div class="loading">Mittwoch geschlossen</div>';
                return;
            }

            const [openHour, closeHour] = openingHours;

            // Find hours with lowest average occupancy (only for "Sauna")
            const hourlyAvgs = [];
            for (let h = openHour; h <= closeHour; h++) {
                const hourData = weekdayData[h] || {};
                const saunaData = hourData[DISPLAY_SAUNA];
                if (saunaData && saunaData.avg !== undefined) {
                    hourlyAvgs.push({ hour: h, avg: saunaData.avg });
                }
            }

            // Sort by average and take top 6
            const best = hourlyAvgs.sort((a, b) => a.avg - b.avg).slice(0, 6);

            if (best.length === 0) {
                container.innerHTML = '<div class="loading">Noch nicht genug Daten für diesen Wochentag</div>';
                return;
            }

            container.innerHTML = best.map(item => `
                <div class="stat-item">
                    <div class="stat-hour">${item.hour}:00</div>
                    <div class="stat-value ${getColorClass(item.avg)}">${Math.round(item.avg)}%</div>
                </div>
            `).join('');
        }

        async function loadData() {
            try {
                // Load current status
                const currentRes = await fetch('data/current.json');
                if (currentRes.ok) {
                    const current = await currentRes.json();
                    renderCurrentStatus(current);
                }

                // Load statistics
                const statsRes = await fetch('data/statistics.json');
                if (statsRes.ok) {
                    const stats = await statsRes.json();
                    renderHourlyChart(stats);
                    renderBestTimes(stats);
                }

                // Load history
                const historyRes = await fetch('data/occupancy_log.json');
                if (historyRes.ok) {
                    const records = await historyRes.json();
                    renderHistoryChart(records);
                }

                // Load weather correlation statistics
                const weatherRes = await fetch('data/weather_stats.json');
                if (weatherRes.ok) {
                    const weatherStats = await weatherRes.json();
                    renderWeatherCorrelation(weatherStats);
                }

            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // Load data when page is ready
        loadData();
    </script>
</body>
</html>
