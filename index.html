<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sauna Lorrainebad - Auslastung</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        .current-status {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .sauna-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .sauna-name {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 20px;
        }

        .occupancy-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .occupancy-circle {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .occupancy-circle svg {
            transform: rotate(-90deg);
        }

        .occupancy-circle .bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 10;
        }

        .occupancy-circle .progress {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .occupancy-circle .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
        }

        .occupancy-info {
            text-align: center;
        }

        .seats {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .message {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #f39c12;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        .weekday-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .weekday-tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .weekday-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        .weekday-tab.active {
            background: #f39c12;
            border-color: #f39c12;
            color: #000;
            font-weight: bold;
        }

        .weekday-tab.women-only {
            border-color: #e91e8b;
        }

        .weekday-tab.women-only.active {
            background: #e91e8b;
        }

        .weekday-tab.closed {
            border-color: #666;
            color: #555;
            text-decoration: line-through;
        }

        .weekday-tab.closed.active {
            background: #444;
            color: #888;
        }

        .day-notice {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .day-notice.women-only {
            background: rgba(233, 30, 139, 0.15);
            border: 1px solid rgba(233, 30, 139, 0.3);
            color: #e91e8b;
        }

        .day-notice.closed {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .stat-hour {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stat-value.low { color: #2ecc71; }
        .stat-value.medium { color: #f39c12; }
        .stat-value.high { color: #e74c3c; }

        .last-update {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .sauna-card { padding: 25px; }
            .occupancy-circle { width: 120px; height: 120px; }
            .seats { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sauna Lorrainebad</h1>
            <p class="subtitle">Aktuelle Auslastung & Statistiken</p>
        </header>

        <div id="current-status" class="current-status">
            <div class="loading">Lade aktuelle Daten...</div>
        </div>

        <div class="section">
            <h2>Typische Auslastung nach Uhrzeit</h2>
            <div id="weekday-tabs" class="weekday-tabs"></div>
            <div id="day-notice"></div>
            <div class="chart-container">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>Verlauf der letzten 24 Stunden</h2>
            <div class="chart-container">
                <canvas id="historyChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>Beste Zeiten <span id="best-times-day"></span></h2>
            <div id="best-times" class="stats-grid">
                <div class="loading">Berechne...</div>
            </div>
        </div>

        <p class="last-update" id="last-update"></p>
    </div>

    <script>
        // Only show "Sauna" (not "Sauna rechts")
        const DISPLAY_SAUNA = 'Sauna';
        const CHART_COLOR = '#f39c12';

        // Weekday configuration
        const WEEKDAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const WEEKDAY_LABELS = {
            'Monday': 'Mo (FLINTA*)',
            'Tuesday': 'Di',
            'Wednesday': 'Mi (Zu)',
            'Thursday': 'Do',
            'Friday': 'Fr',
            'Saturday': 'Sa',
            'Sunday': 'So'
        };
        const SPECIAL_DAYS = {
            'Monday': { type: 'women-only', notice: 'Montag ist FLINTA*-Tag.' },
            'Wednesday': { type: 'closed', notice: 'Mittwoch ist die Sauna geschlossen.' }
        };

        let globalStats = null;
        let hourlyChart = null;
        let selectedWeekday = null;

        function getColor(percent) {
            if (percent < 50) return '#2ecc71';
            if (percent < 80) return '#f39c12';
            return '#e74c3c';
        }

        function getColorClass(percent) {
            if (percent < 50) return 'low';
            if (percent < 80) return 'medium';
            return 'high';
        }

        function createOccupancyCircle(percent) {
            const color = getColor(percent);
            const circumference = 2 * Math.PI * 60;
            const offset = circumference - (Math.min(percent, 100) / 100) * circumference;

            return `
                <svg width="140" height="140" viewBox="0 0 140 140">
                    <circle class="bg" cx="70" cy="70" r="60"></circle>
                    <circle class="progress" cx="70" cy="70" r="60"
                        style="stroke: ${color}; stroke-dasharray: ${circumference}; stroke-dashoffset: ${offset};">
                    </circle>
                </svg>
                <span class="percentage" style="color: ${color}">${Math.round(percent)}%</span>
            `;
        }

        function renderCurrentStatus(data) {
            const container = document.getElementById('current-status');

            if (!data || !data.saunas || data.saunas.length === 0) {
                container.innerHTML = '<div class="loading">Keine aktuellen Daten verfügbar</div>';
                return;
            }

            // Only show "Sauna", not "Sauna rechts"
            const sauna = data.saunas.find(s => s.name === DISPLAY_SAUNA);
            if (!sauna) {
                container.innerHTML = '<div class="loading">Keine aktuellen Daten verfügbar</div>';
                return;
            }

            container.innerHTML = `
                <div class="sauna-card">
                    <div class="sauna-name">Aktuelle Auslastung</div>
                    <div class="occupancy-display">
                        <div class="occupancy-circle">
                            ${createOccupancyCircle(sauna.occupancy_percent)}
                        </div>
                        <div class="occupancy-info">
                            <div class="seats">${sauna.current_seats} / ${sauna.max_seats} Plätze</div>
                            <div class="message">${sauna.capacity_message}</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('last-update').textContent =
                `Letzte Aktualisierung: ${new Date(data.timestamp).toLocaleString('de-CH')}`;
        }

        function getCurrentWeekday() {
            return WEEKDAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
        }

        function renderWeekdayTabs(stats) {
            const container = document.getElementById('weekday-tabs');
            const currentDay = getCurrentWeekday();
            selectedWeekday = currentDay;

            container.innerHTML = WEEKDAYS.map(day => {
                const special = SPECIAL_DAYS[day];
                const specialClass = special ? special.type : '';
                const isActive = day === currentDay ? 'active' : '';
                return `<button class="weekday-tab ${specialClass} ${isActive}" data-day="${day}">${WEEKDAY_LABELS[day]}</button>`;
            }).join('');

            // Add click handlers
            container.querySelectorAll('.weekday-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    container.querySelectorAll('.weekday-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    selectedWeekday = tab.dataset.day;
                    updateHourlyChart();
                    updateDayNotice();
                    renderBestTimes(globalStats);
                });
            });

            updateDayNotice();
        }

        function updateDayNotice() {
            const container = document.getElementById('day-notice');
            const special = SPECIAL_DAYS[selectedWeekday];

            if (special) {
                container.innerHTML = `<div class="day-notice ${special.type}">${special.notice}</div>`;
            } else {
                container.innerHTML = '';
            }
        }

        function hasWeekdayData(weekday) {
            const weekdayData = globalStats?.by_weekday?.[weekday] || {};
            for (let h = 0; h < 24; h++) {
                if (weekdayData[h] && weekdayData[h][DISPLAY_SAUNA]) {
                    return true;
                }
            }
            return false;
        }

        function updateHourlyChart() {
            if (!globalStats || !hourlyChart) return;

            const chartContainer = document.getElementById('hourlyChart').parentElement;
            const noDataMsg = document.getElementById('hourly-no-data');

            // Check if we have data for this weekday
            const hasData = hasWeekdayData(selectedWeekday);

            if (!hasData && selectedWeekday !== 'Wednesday') {
                // Show no data message
                if (!noDataMsg) {
                    const msg = document.createElement('div');
                    msg.id = 'hourly-no-data';
                    msg.className = 'loading';
                    msg.style.position = 'absolute';
                    msg.style.top = '50%';
                    msg.style.left = '50%';
                    msg.style.transform = 'translate(-50%, -50%)';
                    msg.textContent = 'Noch keine Daten für diesen Wochentag';
                    chartContainer.style.position = 'relative';
                    chartContainer.appendChild(msg);
                }
                hourlyChart.data.datasets[0].data = [];
                hourlyChart.update();
                return;
            } else if (noDataMsg) {
                noDataMsg.remove();
            }

            const hours = [];
            const data = [];

            // Use weekday-specific data only (no fallback)
            const weekdayData = globalStats.by_weekday?.[selectedWeekday] || {};

            for (let h = 6; h <= 22; h++) {
                hours.push(`${h}:00`);
                // For Wednesday (closed), show null
                if (selectedWeekday === 'Wednesday') {
                    data.push(null);
                } else {
                    const hourData = weekdayData[h] || {};
                    const saunaData = hourData[DISPLAY_SAUNA];
                    data.push(saunaData ? saunaData.avg : null);
                }
            }

            hourlyChart.data.labels = hours;
            hourlyChart.data.datasets[0].data = data;
            hourlyChart.update();
        }

        function renderHourlyChart(stats) {
            globalStats = stats;
            const ctx = document.getElementById('hourlyChart').getContext('2d');

            renderWeekdayTabs(stats);

            const hours = [];
            const data = [];

            // Use weekday-specific data for current day (no fallback)
            const currentDay = getCurrentWeekday();
            const weekdayData = stats.by_weekday?.[currentDay] || {};

            for (let h = 6; h <= 22; h++) {
                hours.push(`${h}:00`);
                if (currentDay === 'Wednesday') {
                    data.push(null);
                } else {
                    const hourData = weekdayData[h] || {};
                    const saunaData = hourData[DISPLAY_SAUNA];
                    data.push(saunaData ? saunaData.avg : null);
                }
            }

            hourlyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [{
                        label: 'Auslastung',
                        data: data,
                        borderColor: CHART_COLOR,
                        backgroundColor: CHART_COLOR + '30',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 120,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888', callback: v => v + '%' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }

        function renderHistoryChart(records) {
            const container = document.getElementById('historyChart').parentElement;

            // Get last 24 hours of data, only for "Sauna", sorted by time
            const now = new Date();
            const oneDayAgo = new Date(now - 24 * 60 * 60 * 1000);

            const filteredData = records
                .filter(r => r.name === DISPLAY_SAUNA && new Date(r.timestamp) >= oneDayAgo)
                .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            // Need at least 2 data points for a meaningful chart
            if (filteredData.length < 2) {
                container.innerHTML = '<div class="loading">Sammle Daten... (mind. 2 Messpunkte nötig)</div>';
                return;
            }

            // Use simple labels instead of time scale to avoid rendering issues
            const labels = filteredData.map(r => {
                const d = new Date(r.timestamp);
                return d.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
            });
            const values = filteredData.map(r => r.occupancy_percent);

            const ctx = document.getElementById('historyChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Auslastung',
                        data: values,
                        borderColor: CHART_COLOR,
                        borderWidth: 2,
                        fill: false,
                        tension: 0.3,
                        pointRadius: 4,
                        pointBackgroundColor: CHART_COLOR
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 120,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888', callback: v => v + '%' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888', maxRotation: 45 }
                        }
                    }
                }
            });
        }

        function renderBestTimes(stats) {
            const container = document.getElementById('best-times');
            const dayLabel = document.getElementById('best-times-day');

            const dayNames = {
                'Monday': '(Montag)',
                'Tuesday': '(Dienstag)',
                'Wednesday': '(Mittwoch)',
                'Thursday': '(Donnerstag)',
                'Friday': '(Freitag)',
                'Saturday': '(Samstag)',
                'Sunday': '(Sonntag)'
            };
            dayLabel.textContent = dayNames[selectedWeekday] || '';

            // Wednesday is closed
            if (selectedWeekday === 'Wednesday') {
                container.innerHTML = '<div class="loading">Mittwoch geschlossen</div>';
                return;
            }

            // Use weekday-specific data only (no fallback)
            const weekdayData = stats.by_weekday?.[selectedWeekday] || {};

            // Find hours with lowest average occupancy (only for "Sauna")
            const hourlyAvgs = [];
            for (let h = 6; h <= 22; h++) {
                const hourData = weekdayData[h] || {};
                const saunaData = hourData[DISPLAY_SAUNA];
                if (saunaData && saunaData.avg !== undefined) {
                    hourlyAvgs.push({ hour: h, avg: saunaData.avg });
                }
            }

            // Sort by average and take top 6
            const best = hourlyAvgs.sort((a, b) => a.avg - b.avg).slice(0, 6);

            if (best.length === 0) {
                container.innerHTML = '<div class="loading">Noch nicht genug Daten für diesen Wochentag</div>';
                return;
            }

            container.innerHTML = best.map(item => `
                <div class="stat-item">
                    <div class="stat-hour">${item.hour}:00</div>
                    <div class="stat-value ${getColorClass(item.avg)}">${Math.round(item.avg)}%</div>
                </div>
            `).join('');
        }

        async function loadData() {
            try {
                // Load current status
                const currentRes = await fetch('data/current.json');
                if (currentRes.ok) {
                    const current = await currentRes.json();
                    renderCurrentStatus(current);
                }

                // Load statistics
                const statsRes = await fetch('data/statistics.json');
                if (statsRes.ok) {
                    const stats = await statsRes.json();
                    renderHourlyChart(stats);
                    renderBestTimes(stats);
                }

                // Load history
                const historyRes = await fetch('data/occupancy_log.json');
                if (historyRes.ok) {
                    const records = await historyRes.json();
                    renderHistoryChart(records);
                }

            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // Load data when page is ready
        loadData();
    </script>
</body>
</html>
